<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; margin-right: 5px; }
        button#pdfBtn { background-color: #dc3545; display: none; }
        #resultado { margin-top: 20px; white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-left: 5px solid #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>Consulta de CNPJ</h2>
    <input type="text" id="cnpjInput" placeholder="Digite apenas números" maxlength="14">
    <button onclick="consultarCNPJ()">Consultar</button>
    <button id="pdfBtn" onclick="gerarPDF()">Gerar PDF</button>

    <div id="resultado">
        Aguardando consulta...
    </div>
</div>

<script>
    let dadosEmpresa = null;

    async function consultarCNPJ() {
        const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        const display = document.getElementById('resultado');
        const pdfBtn = document.getElementById('pdfBtn');

        if (cnpj.length !== 14) {
            alert("Por favor, digite um CNPJ válido com 14 dígitos.");
            return;
        }

        display.innerHTML = "Carregando...";

        try {
            // Usando a BrasilAPI (Gratuita e não precisa de chave)
            const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            
            if (!response.ok) throw new Error('CNPJ não encontrado.');

            dadosEmpresa = await response.json();

            // Montando a visualização
            display.innerHTML = `
                <strong>Razão Social:</strong> ${dadosEmpresa.razao_social}
                <strong>Nome Fantasia:</strong> ${dadosEmpresa.nome_fantasia || 'N/A'}
                <strong>CNPJ:</strong> ${dadosEmpresa.cnpj}
                <strong>Situação Cadastral:</strong> ${dadosEmpresa.descricao_situacao_cadastral}
                <strong>Atividade Principal:</strong> ${dadosEmpresa.cnae_fiscal_descricao}
                <strong>Capital Social:</strong> R$ ${dadosEmpresa.capital_social.toLocaleString('pt-BR')}
                <strong>Endereço:</strong> ${dadosEmpresa.logradouro}, ${dadosEmpresa.numero} - ${dadosEmpresa.bairro}, ${dadosEmpresa.municipio}/${dadosEmpresa.uf}
                <strong>Telefone:</strong> ${dadosEmpresa.ddd_telefone_1}
                <strong>Data de Início de Atividade:</strong> ${dadosEmpresa.data_inicio_atividade}
            `;
            pdfBtn.style.display = 'inline-block';

        } catch (error) {
            display.innerHTML = `<span style="color:red">Erro: ${error.message}</span>`;
            pdfBtn.style.display = 'none';
        }
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("Relatório de Consulta de CNPJ", 10, 20);
        
        doc.setFontSize(12);
        let y = 40;
        const linhas = document.getElementById('resultado').innerText.split('\n');
        
        linhas.forEach(linha => {
            doc.text(linha, 10, y);
            y += 10;
        });

        doc.save(`CNPJ_${dadosEmpresa.cnpj}.pdf`);
    }
</script>

</body>
</html>
